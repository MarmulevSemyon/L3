<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>WarehouseControl</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2933;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    label {
      font-size: 14px;
      color: #52616b;
      display: block;
      margin-bottom: 6px;
    }

    input, select {
      padding: 10px;
      border: 1px solid #cfd8dc;
      border-radius: 8px;
      min-width: 180px;
      font-size: 14px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #1d4ed8;
    }

    button.secondary {
      background: #64748b;
    }

    button.secondary:hover {
      background: #475569;
    }

    button.danger {
      background: #dc2626;
    }

    button.danger:hover {
      background: #b91c1c;
    }

    button:disabled {
      background: #cbd5e1;
      cursor: not-allowed;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 12px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #f8fafc;
      color: #334155;
    }

    .status {
      padding: 10px;
      border-radius: 8px;
      background: #eef2ff;
      color: #3730a3;
      margin-top: 12px;
      white-space: pre-wrap;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
    }

    .success {
      background: #dcfce7;
      color: #166534;
    }

    .hidden {
      display: none;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      background: #f8fafc;
      padding: 8px;
      border-radius: 8px;
      max-width: 420px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .role-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #e0f2fe;
      color: #0369a1;
      font-size: 13px;
      margin-left: 8px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>WarehouseControl</h1>

  <div class="card">
    <h2>Вход</h2>

    <div class="row">
      <div>
        <label for="username">Пользователь</label>
        <select id="username">
          <option value="admin">admin</option>
          <option value="manager">manager</option>
          <option value="viewer">viewer</option>
        </select>
      </div>

      <div>
        <label>&nbsp;</label>
        <button onclick="login()">Войти</button>
      </div>

      <div>
        <label>&nbsp;</label>
        <button class="secondary" onclick="logout()">Выйти</button>
      </div>
    </div>

    <div id="userInfo" class="status hidden"></div>
  </div>

  <div id="mainContent" class="hidden">
    <div class="card" id="itemFormCard">
      <h2 id="formTitle">Добавить товар</h2>

      <input type="hidden" id="itemId">

      <div class="row">
        <div>
          <label for="name">Название</label>
          <input id="name" placeholder="Например: Ноутбук Lenovo">
        </div>

        <div>
          <label for="description">Описание</label>
          <input id="description" placeholder="Описание товара">
        </div>

        <div>
          <label for="quantity">Количество</label>
          <input id="quantity" type="number" min="0" value="0">
        </div>

        <div>
          <label for="price">Цена</label>
          <input id="price" type="number" min="0" step="0.01" value="0">
        </div>

        <div>
          <label>&nbsp;</label>
          <button onclick="saveItem()">Сохранить</button>
        </div>

        <div>
          <label>&nbsp;</label>
          <button class="secondary" onclick="resetForm()">Сбросить</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <h2 style="margin-bottom: 0;">Товары</h2>
        <button class="secondary" onclick="loadItems()">Обновить список</button>
      </div>

      <table>
        <thead>
        <tr>
          <th>ID</th>
          <th>Название</th>
          <th>Описание</th>
          <th>Количество</th>
          <th>Цена</th>
          <th>Создан</th>
          <th>Обновлен</th>
          <th>Действия</th>
        </tr>
        </thead>
        <tbody id="itemsTableBody"></tbody>
      </table>
    </div>

    <div class="card">
      <h2>История изменений</h2>
      <div id="historyTitle" class="status">Выберите товар и нажмите «История».</div>

      <table>
        <thead>
        <tr>
          <th>ID</th>
          <th>Действие</th>
          <th>Пользователь</th>
          <th>Роль</th>
          <th>Время</th>
          <th>Старые данные</th>
          <th>Новые данные</th>
        </tr>
        </thead>
        <tbody id="historyTableBody"></tbody>
      </table>
    </div>
  </div>

  <div id="message" class="status hidden"></div>
</div>

<script>
  let token = localStorage.getItem("warehouse_token") || "";
  let currentUser = JSON.parse(localStorage.getItem("warehouse_user") || "null");

  function showMessage(text, type = "") {
    const message = document.getElementById("message");
    message.textContent = text;
    message.className = "status";

    if (type === "error") {
      message.classList.add("error");
    }

    if (type === "success") {
      message.classList.add("success");
    }

    message.classList.remove("hidden");
  }

  function hideMessage() {
    document.getElementById("message").classList.add("hidden");
  }

  function authHeaders() {
    return {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    };
  }

  function updateUIByRole() {
    const mainContent = document.getElementById("mainContent");
    const userInfo = document.getElementById("userInfo");
    const itemFormCard = document.getElementById("itemFormCard");

    if (!token || !currentUser) {
      mainContent.classList.add("hidden");
      userInfo.classList.add("hidden");
      return;
    }

    mainContent.classList.remove("hidden");
    userInfo.classList.remove("hidden");

    userInfo.innerHTML =
      "Вошли как: <b>" + currentUser.username + "</b>" +
      "<span class='role-badge'>" + currentUser.role + "</span>";

    if (currentUser.role === "viewer") {
      itemFormCard.classList.add("hidden");
    } else {
      itemFormCard.classList.remove("hidden");
    }
  }

  async function login() {
    hideMessage();

    const username = document.getElementById("username").value;

    try {
      const response = await fetch("/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ username })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Ошибка входа");
      }

      token = data.token;
      currentUser = data.user;

      localStorage.setItem("warehouse_token", token);
      localStorage.setItem("warehouse_user", JSON.stringify(currentUser));

      updateUIByRole();
      await loadItems();

      showMessage("Вход выполнен успешно", "success");
    } catch (error) {
      showMessage(error.message, "error");
    }
  }

  function logout() {
    token = "";
    currentUser = null;

    localStorage.removeItem("warehouse_token");
    localStorage.removeItem("warehouse_user");

    document.getElementById("itemsTableBody").innerHTML = "";
    document.getElementById("historyTableBody").innerHTML = "";
    document.getElementById("historyTitle").textContent = "Выберите товар и нажмите «История».";

    resetForm();
    updateUIByRole();

    showMessage("Вы вышли из системы", "success");
  }

  async function loadItems() {
    hideMessage();

    try {
      const response = await fetch("/items", {
        method: "GET",
        headers: authHeaders()
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Не удалось загрузить товары");
      }

      renderItems(data.result || []);
    } catch (error) {
      showMessage(error.message, "error");
    }
  }

  function renderItems(items) {
    const tbody = document.getElementById("itemsTableBody");
    tbody.innerHTML = "";

    if (items.length === 0) {
      tbody.innerHTML = "<tr><td colspan='8'>Товаров пока нет</td></tr>";
      return;
    }

    for (const item of items) {
      const canEdit = currentUser && (currentUser.role === "admin" || currentUser.role === "manager");
      const canDelete = currentUser && currentUser.role === "admin";

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${item.id}</td>
        <td>${escapeHtml(item.name)}</td>
        <td>${escapeHtml(item.description)}</td>
        <td>${item.quantity}</td>
        <td>${item.price}</td>
        <td>${formatDate(item.created_at)}</td>
        <td>${formatDate(item.updated_at)}</td>
        <td>
          <div class="actions">
            <button class="secondary" onclick='loadHistory(${item.id})'>История</button>
            <button ${canEdit ? "" : "disabled"} onclick='fillForm(${JSON.stringify(item)})'>Редактировать</button>
            <button class="danger" ${canDelete ? "" : "disabled"} onclick='deleteItem(${item.id})'>Удалить</button>
          </div>
        </td>
      `;

      tbody.appendChild(tr);
    }
  }

  function fillForm(item) {
    document.getElementById("formTitle").textContent = "Редактировать товар #" + item.id;
    document.getElementById("itemId").value = item.id;
    document.getElementById("name").value = item.name;
    document.getElementById("description").value = item.description;
    document.getElementById("quantity").value = item.quantity;
    document.getElementById("price").value = item.price;
  }

  function resetForm() {
    document.getElementById("formTitle").textContent = "Добавить товар";
    document.getElementById("itemId").value = "";
    document.getElementById("name").value = "";
    document.getElementById("description").value = "";
    document.getElementById("quantity").value = "0";
    document.getElementById("price").value = "0";
  }

  async function saveItem() {
    hideMessage();

    const id = document.getElementById("itemId").value;

    const payload = {
      name: document.getElementById("name").value,
      description: document.getElementById("description").value,
      quantity: Number(document.getElementById("quantity").value),
      price: Number(document.getElementById("price").value)
    };

    const url = id ? "/items/" + id : "/items";
    const method = id ? "PUT" : "POST";

    try {
      const response = await fetch(url, {
        method,
        headers: authHeaders(),
        body: JSON.stringify(payload)
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Не удалось сохранить товар");
      }

      resetForm();
      await loadItems();

      showMessage("Товар сохранен", "success");
    } catch (error) {
      showMessage(error.message, "error");
    }
  }

  async function deleteItem(id) {
    hideMessage();

    if (!confirm("Удалить товар #" + id + "?")) {
      return;
    }

    try {
      const response = await fetch("/items/" + id, {
        method: "DELETE",
        headers: authHeaders()
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Не удалось удалить товар");
      }

      await loadItems();
      await loadHistory(id);

      showMessage("Товар удален", "success");
    } catch (error) {
      showMessage(error.message, "error");
    }
  }

  async function loadHistory(itemId) {
    hideMessage();

    try {
      const response = await fetch("/items/" + itemId + "/history", {
        method: "GET",
        headers: authHeaders()
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Не удалось загрузить историю");
      }

      renderHistory(itemId, data.result || []);
    } catch (error) {
      showMessage(error.message, "error");
    }
  }

  function renderHistory(itemId, history) {
    const title = document.getElementById("historyTitle");
    const tbody = document.getElementById("historyTableBody");

    title.textContent = "История товара #" + itemId;
    tbody.innerHTML = "";

    if (history.length === 0) {
      tbody.innerHTML = "<tr><td colspan='7'>История пуста</td></tr>";
      return;
    }

    for (const record of history) {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${record.id}</td>
        <td>${record.action}</td>
        <td>${record.changed_by_username || ""}</td>
        <td>${record.changed_by_role || ""}</td>
        <td>${formatDate(record.changed_at)}</td>
        <td><pre>${prettyJson(record.old_data)}</pre></td>
        <td><pre>${prettyJson(record.new_data)}</pre></td>
      `;

      tbody.appendChild(tr);
    }
  }

  function prettyJson(value) {
    if (value === null || value === undefined) {
      return "null";
    }

    try {
      return JSON.stringify(value, null, 2);
    } catch (error) {
      return String(value);
    }
  }

  function formatDate(value) {
    if (!value) {
      return "";
    }

    return new Date(value).toLocaleString("ru-RU");
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  updateUIByRole();

  if (token && currentUser) {
    loadItems();
  }
</script>
</body>
</html>
