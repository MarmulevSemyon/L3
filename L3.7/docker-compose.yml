services:
  postgres:
    image: postgres:16
    container_name: warehousecontrol-postgres
    environment:
      POSTGRES_DB: warehousecontrol
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - warehousecontrol_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d warehousecontrol"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:4
    container_name: warehousecontrol-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://postgres:postgres@postgres:5432/warehousecontrol?sslmode=disable",
        "up"
      ]
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: warehousecontrol-app
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      CONFIG_PATH: /app/config/docker.yaml
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  warehousecontrol_pg_data: