<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>SalesTracker</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 1100px; margin: 30px auto; padding: 0 16px; }
    h1, h2 { margin-bottom: 12px; }
    form, .panel { border: 1px solid #ddd; padding: 16px; border-radius: 8px; margin-bottom: 20px; }
    input, select, button { padding: 8px; margin: 4px 0; width: 100%; box-sizing: border-box; }
    button { cursor: pointer; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    .row-actions button { width: auto; margin-right: 6px; }
    .analytics { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; }
  </style>
</head>
<body>
  <h1>SalesTracker</h1>

  <form id="createForm">
    <h2>Добавить запись</h2>
    <div class="grid">
      <div>
        <label>Тип</label>
        <select id="type">
          <option value="income">income</option>
          <option value="expense">expense</option>
        </select>
      </div>
      <div>
        <label>Сумма</label>
        <input id="amount" type="number" step="0.01" required />
      </div>
      <div>
        <label>Категория</label>
        <input id="category" type="text" required />
      </div>
      <div>
        <label>Дата и время</label>
        <input id="occurredAt" type="datetime-local" required />
      </div>
    </div>
    <div>
      <label>Описание</label>
      <input id="description" type="text" />
    </div>
    <button type="submit">Создать</button>
  </form>

  <div class="panel">
    <h2>Фильтры</h2>
    <div class="grid-4">
      <div>
        <label>От</label>
        <input id="from" type="date" />
      </div>
      <div>
        <label>До</label>
        <input id="to" type="date" />
      </div>
      <div>
        <label>Тип</label>
        <select id="filterType">
          <option value="">all</option>
          <option value="income">income</option>
          <option value="expense">expense</option>
        </select>
      </div>
      <div>
        <label>Категория</label>
        <input id="filterCategory" type="text" />
      </div>
    </div>

    <div class="grid-4">
      <div>
        <label>Сортировка</label>
        <select id="sortBy">
          <option value="occurred_at">occurred_at</option>
          <option value="amount">amount</option>
          <option value="created_at">created_at</option>
        </select>
      </div>
      <div>
        <label>Порядок</label>
        <select id="order">
          <option value="desc">desc</option>
          <option value="asc">asc</option>
        </select>
      </div>
      <div>
        <label>Limit</label>
        <input id="limit" type="number" value="50" />
      </div>
      <div>
        <label>Offset</label>
        <input id="offset" type="number" value="0" />
      </div>
    </div>

    <button onclick="loadItems()">Загрузить записи</button>
    <button onclick="loadAnalytics()">Получить аналитику</button>
    <button onclick="downloadCSV()">Скачать CSV</button>
  </div>

  <div class="panel">
    <h2>Аналитика</h2>
    <div id="analytics" class="analytics"></div>
  </div>

  <div class="panel">
    <h2>Записи</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Тип</th>
          <th>Сумма</th>
          <th>Категория</th>
          <th>Описание</th>
          <th>Дата</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody id="itemsBody"></tbody>
    </table>
  </div>

  <script>
    const createForm = document.getElementById("createForm");

    createForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const payload = {
        type: document.getElementById("type").value,
        amount: Number(document.getElementById("amount").value),
        category: document.getElementById("category").value,
        description: document.getElementById("description").value,
        occurred_at: new Date(document.getElementById("occurredAt").value).toISOString(),
      };

      const res = await fetch("/items", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      const data = await res.json();
      if (!res.ok) {
        alert(data.error || "Ошибка");
        return;
      }

      createForm.reset();
      loadItems();
      loadAnalytics();
    });

    function buildQuery() {
      const params = new URLSearchParams();

      const from = document.getElementById("from").value;
      const to = document.getElementById("to").value;
      const type = document.getElementById("filterType").value;
      const category = document.getElementById("filterCategory").value;
      const sortBy = document.getElementById("sortBy").value;
      const order = document.getElementById("order").value;
      const limit = document.getElementById("limit").value;
      const offset = document.getElementById("offset").value;

      if (from) params.append("from", from);
      if (to) params.append("to", to);
      if (type) params.append("type", type);
      if (category) params.append("category", category);
      if (sortBy) params.append("sort_by", sortBy);
      if (order) params.append("order", order);
      if (limit) params.append("limit", limit);
      if (offset) params.append("offset", offset);

      return params.toString();
    }

    async function loadItems() {
      const res = await fetch(`/items?${buildQuery()}`);
      const data = await res.json();

      if (!res.ok) {
        alert(data.error || "Ошибка загрузки");
        return;
      }

      const body = document.getElementById("itemsBody");
      body.innerHTML = "";

      for (const item of data.items || []) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${item.id}</td>
          <td>${item.type}</td>
          <td>${item.amount}</td>
          <td>${item.category}</td>
          <td>${item.description}</td>
          <td>${new Date(item.occurred_at).toLocaleString()}</td>
          <td class="row-actions">
            <button onclick="deleteItem(${item.id})">Удалить</button>
          </td>
        `;
        body.appendChild(tr);
      }
    }

    async function loadAnalytics() {
      const params = new URLSearchParams();

      const from = document.getElementById("from").value;
      const to = document.getElementById("to").value;
      const type = document.getElementById("filterType").value;
      const category = document.getElementById("filterCategory").value;

      if (from) params.append("from", from);
      if (to) params.append("to", to);
      if (type) params.append("type", type);
      if (category) params.append("category", category);

      const res = await fetch(`/analytics?${params.toString()}`);
      const data = await res.json();

      if (!res.ok) {
        alert(data.error || "Ошибка аналитики");
        return;
      }

      const a = data.analytics || {};
      document.getElementById("analytics").innerHTML = `
        <div class="card"><strong>sum</strong><br>${a.sum ?? 0}</div>
        <div class="card"><strong>avg</strong><br>${a.avg ?? 0}</div>
        <div class="card"><strong>count</strong><br>${a.count ?? 0}</div>
        <div class="card"><strong>median</strong><br>${a.median ?? 0}</div>
        <div class="card"><strong>p90</strong><br>${a.p90 ?? 0}</div>
      `;
    }

    async function deleteItem(id) {
      const res = await fetch(`/items/${id}`, { method: "DELETE" });
      const data = await res.json();

      if (!res.ok) {
        alert(data.error || "Ошибка удаления");
        return;
      }

      loadItems();
      loadAnalytics();
    }

    function downloadCSV() {
      window.location.href = `/items/export?${buildQuery()}`;
    }

    loadItems();
    loadAnalytics();
  </script>
</body>
</html>
