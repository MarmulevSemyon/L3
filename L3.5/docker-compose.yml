services:
  postgres:
    image: postgres:16-alpine
    container_name: eventbooker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: eventbooker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventbooker"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventbooker-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_ADDR: ":8080"
      SERVER_READ_TIMEOUT: "10s"
      SERVER_WRITE_TIMEOUT: "10s"
      SERVER_IDLE_TIMEOUT: "60s"

      LOG_ENGINE: "slog"
      LOG_LEVEL: "info"

      GIN_MODE: "debug"

      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      DB_NAME: "eventbooker"
      DB_SSLMODE: "disable"
      DB_MAX_OPEN_CONNS: "10"
      DB_MAX_IDLE_CONNS: "5"
      DB_CONN_MAX_LIFETIME: "5m"

      SCHEDULER_INTERVAL: "15s"
    ports:
      - "8080:8080"
    volumes:
      - ./web:/app/web:ro
      - ./migrations:/app/migrations:ro

volumes:
  postgres_data: