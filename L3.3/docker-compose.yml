
services:
  postgres:
    image: postgres:16
    container_name: commentTree-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: commentTree
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d commentTree"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: commentTree-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/commentTree?sslmode=disable
    ports:
      - "8080:8080"

volumes:
  postgres_data: